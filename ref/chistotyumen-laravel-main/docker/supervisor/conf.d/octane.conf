[program:octane]
command=php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=4 --max-requests=500
directory=/var/www/html
user=www
autostart=true
autorestart=true
stopwaitsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
